<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Paulina 💖</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: linear-gradient(#ffdde1, #ee9ca7);
  font-family: Arial, sans-serif;
  text-align: center;
}

h1 {
  position: absolute;
  top: 35%;
  width: 100%;
  color: white;
  font-size: 32px;
  padding: 0 20px;
}

p {
  position: absolute;
  top: 50%;
  width: 100%;
  color: white;
  font-size: 20px;
}

.element {
  position: absolute;
  font-size: 30px;
  animation: float linear infinite;
}

@keyframes float {
  0% { transform: translateY(-10%); opacity: 1; }
  100% { transform: translateY(110vh); opacity: 0; }
}
</style>
</head>
<body>

<h1>Paulina 💖</h1>
<p>Te quise hacer esto…<br>
Es lo que sé hacer muy bien,<br>
tiro líneas de código 💻✨</p>

<script>
const emojis = ["🌸","🌺","🌼","🐰","🐻","🐶","💖","✨"];

function crearElemento() {
  const el = document.createElement("div");
  el.classList.add("element");
  el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
  
  el.style.left = Math.random() * 100 + "vw";
  el.style.animationDuration = (Math.random() * 3 + 4) + "s";
  el.style.fontSize = (Math.random() * 20 + 20) + "px";

  document.body.appendChild(el);

  setTimeout(() => {
    el.remove();
  }, 7000);
}

setInterval(crearElemento, 180);
</script>

</body>
</html>
